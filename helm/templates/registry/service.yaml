{{- if .Values.registry.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: beeai-platform-registry-svc
  labels:
    app: beeai-platform-registry
    {{- include "beeai-platform.labels" . | nindent 4 }}
spec:
  selector:
    app: beeai-platform-registry
    {{- include "beeai-platform.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.registry.service.port }}
      targetPort: 5000
      nodePort: {{ .Values.registry.service.nodePort }}
  type: {{ .Values.registry.service.type }}
{{- end }}